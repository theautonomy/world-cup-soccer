name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'data/teams/**'
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Copy team JSON files into app public directory
        run: |
          mkdir -p app/public/data/teams
          if ls data/teams/*.json 1>/dev/null 2>&1; then
            cp data/teams/*.json app/public/data/teams/
            echo "Copied $(ls data/teams/*.json | wc -l) JSON files"
          else
            echo "No JSON files found in data/teams/ — building with empty team list"
          fi

      - name: Build team index JSON
        run: |
          node -e "
          const fs = require('fs');
          const dir = 'app/public/data/teams';
          if (!fs.existsSync(dir)) { fs.mkdirSync(dir, { recursive: true }); }
          const files = fs.existsSync(dir)
            ? fs.readdirSync(dir).filter(f => f.endsWith('.json') && f !== 'index.json')
            : [];
          const index = files.map(f => {
            try {
              const d = JSON.parse(fs.readFileSync(dir + '/' + f, 'utf-8'));
              return {
                slug: d.meta.slug,
                name_zh: d.team.name_zh,
                name_en: d.team.name_en,
                flag_emoji: d.team.flag_emoji,
                fifa_rank: d.team.fifa_rank,
              };
            } catch(e) { return null; }
          }).filter(Boolean);
          fs.writeFileSync(dir + '/index.json', JSON.stringify(index, null, 2));
          console.log('index.json written with ' + index.length + ' teams.');
          "

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build React app
        working-directory: app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
