<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>2026 FIFA World Cup</title>
    <script>
      // GitHub Pages SPA redirect — preserve path as query string
      // https://github.com/rafgraph/spa-github-pages
      var segmentCount = 1; // depth of repo subdirectory (1 for /world-cup-soccer/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
