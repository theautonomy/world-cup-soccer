<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 FIFA World Cup — 48 Nations</title>
    <meta name="description" content="AI-generated profiles for all 48 nations competing in the 2026 FIFA World Cup. Bilingual Chinese/English. Built with Claude Code." />
    <link rel="icon" type="image/svg+xml" href="/world-cup-soccer/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect — restore path from query string
      // Pairs with public/404.html which encodes path as ?p=/...&q=...
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          // decoded[0] = "p=/teams/england" → slice(2) skips "p="
          // decoded[1] = "q=originalSearch"  → slice(2) skips "q="
          // l.pathname = "/world-cup-soccer/" → slice(0,-1) strips trailing slash
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) +
            (decoded[0] ? decoded[0].slice(2) : '') +
            (decoded[1] ? '?' + decoded[1].slice(2) : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
